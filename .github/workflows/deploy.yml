name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
  rm -rf self-healing-canary-devops-aws || true
  git clone https://github.com/Akshaysa8595/self-healing-canary-devops-aws.git

  cd self-healing-canary-devops-aws/app

  docker stop $(docker ps -q) || true
  docker rm $(docker ps -aq) || true

  docker build -t my-app .
  docker run -d -p 80:80 my-app